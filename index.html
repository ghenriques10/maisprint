async function renderReportsPage(main){
  const txs=await dbAll('transactions');
  const orders=await dbAll('orders');
  const clients=await dbAll('clients');const cMap={};clients.forEach(c=>cMap[c.id]=c.nome);

  const totRec=txs.filter(t=>t.tipo==='receita').reduce((s,t)=>s+(t.valor||0),0);
  const totDesp=txs.filter(t=>t.tipo==='despesa').reduce((s,t)=>s+(t.valor||0),0);
  const lucro=totRec-totDesp;

  // Receita por categoria
  const porCat={};
  txs.filter(t=>t.tipo==='receita').forEach(t=>{porCat[t.categoria]=(porCat[t.categoria]||0)+(t.valor||0);});
  const despCat={};
  txs.filter(t=>t.tipo==='despesa').forEach(t=>{despCat[t.categoria]=(despCat[t.categoria]||0)+(t.valor||0);});

  // Pedidos: a receber
  const pedidos=orders.filter(o=>o.status!=='orcamento');
  const aReceber=pedidos.filter(o=>o.pago!=='sim').reduce((s,o)=>s+((o.precoFinal||0)-(o.entrada||0)),0);
  const faturado=pedidos.reduce((s,o)=>s+(o.precoFinal||0),0);
  const ticket=pedidos.length>0?faturado/pedidos.length:0;

  // Top clientes
  const porCliente={};
  pedidos.forEach(o=>{if(o.clienteId)porCliente[o.clienteId]=(porCliente[o.clienteId]||0)+(o.precoFinal||0);});
  const topCli=Object.entries(porCliente).sort((a,b)=>b[1]-a[1]).slice(0,5);

  const barCat=(obj,cor)=>{
    const max=Math.max(...Object.values(obj),1);
    const items=Object.entries(obj).sort((a,b)=>b[1]-a[1]);
    if(items.length===0)return '<p style="color:var(--text-3);font-size:13px">Sem dados ainda.</p>';
    return items.map(([k,v])=>`
      <div style="margin-bottom:10px">
        <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:3px"><span>${esc(k)}</span><b>${fmt(v)}</b></div>
        <div style="height:7px;background:var(--surface-3);border-radius:4px;overflow:hidden"><div style="height:100%;width:${(v/max*100)}%;background:${cor};border-radius:4px"></div></div>
      </div>`).join('');
  };

  main.innerHTML=`
    <div class="page-head">
      <h2><svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="var(--brand)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${ICON.reports}</svg> Relatórios</h2>
      <p class="desc">A saúde do seu negócio, desde o começo.</p>
    </div>
    <div class="fin-cards">
      <div class="fin-card rec"><div class="fc-label">Receita total</div><div class="fc-val">${fmt(totRec)}</div></div>
      <div class="fin-card desp"><div class="fc-label">Despesa total</div><div class="fc-val">${fmt(totDesp)}</div></div>
      <div class="fin-card saldo"><div class="fc-label">Lucro acumulado</div><div class="fc-val">${fmt(lucro)}</div></div>
      <div class="fin-card"><div class="fc-label">A receber (pendente)</div><div class="fc-val" style="color:#D97706">${fmt(aReceber)}</div></div>
    </div>
    <div class="fin-cards">
      <div class="fin-card"><div class="fc-label">Pedidos realizados</div><div class="fc-val">${pedidos.length}</div></div>
      <div class="fin-card"><div class="fc-label">Total faturado</div><div class="fc-val">${fmt(faturado)}</div></div>
      <div class="fin-card"><div class="fc-label">Ticket médio</div><div class="fc-val">${fmt(ticket)}</div></div>
    </div>
    <div class="fin-layout">
      <div class="card">
        <div class="card-title"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="20" x2="12" y2="10"/><line x1="18" y1="20" x2="18" y2="4"/><line x1="6" y1="20" x2="6" y2="16"/></svg> Receitas por categoria</div>
        <div class="card-sub">De onde vem seu dinheiro.</div>
        ${barCat(porCat,'#1A8A4E')}
      </div>
      <div class="card">
        <div class="card-title"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="20" x2="12" y2="10"/><line x1="18" y1="20" x2="18" y2="4"/><line x1="6" y1="20" x2="6" y2="16"/></svg> Despesas por categoria</div>
        <div class="card-sub">Para onde ele vai.</div>
        ${barCat(despCat,'#E5484D')}
      </div>
    </div>
    <div class="card">
      <div class="card-title"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${ICON.clients}</svg> Seus melhores clientes</div>
      <div class="card-sub">Quem mais faz pedidos com você.</div>
      ${topCli.length===0?'<p style="color:var(--text-3);font-size:13px">Sem dados ainda.</p>':`
      <div class="tbl-scroll"><table>
        <thead><tr><th>Cliente</th><th class="t-right">Total em pedidos</th></tr></thead>
        <tbody>${topCli.map(([id,v])=>`<tr><td class="t-main">${esc(cMap[id]||'—')}</td><td class="t-right"><b style="color:var(--brand)">${fmt(v)}</b></td></tr>`).join('')}</tbody>
      </table></div>`}
    </div>`;
}

/* ============================================================
   GERADOR DE PDF DO ORÇAMENTO (estilo moderno)
   ============================================================ */
let pdfItens=[];
async function pdfModal(orderId){
  const o=await dbGet('orders',orderId);if(!o)return;
  const clients=await dbAll('clients');const cli=clients.find(c=>c.id===o.clienteId);
  // Itens iniciais: a descrição do trabalho como 1 item com o preço final
  // Se o orçamento tem vários produtos, lista todos; senão, um item só
  if(o.produtos&&o.produtos.length){
    pdfItens=o.produtos.map(p=>({desc:p.desc,qtd:p.qtd||1,valor:p.precoUnit||0}));
  }else{
    pdfItens=[{desc:o.descricao||'Serviço',qtd:1,valor:o.precoFinal||0}];
  }
  window._pdfOrder=o;window._pdfCli=cli;
  openModal(`
    <div class="modal-head">
      <h3>Gerar orçamento em PDF</h3>
      <button class="close" onclick="closeModal()"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <div class="modal-body">
      <p style="font-size:12.5px;color:var(--text-2);margin-bottom:16px">Revise os itens que o cliente vai ver. Seus custos internos não aparecem — só os valores finais.</p>
      <div class="modal-section-label" style="margin-top:0">Itens do orçamento</div>
      <div id="pdfItensList"></div>
      <button class="btn-save" style="background:var(--surface-3);color:var(--text);box-shadow:none;border:1px solid var(--border-strong);margin-top:4px;padding:8px 14px;font-size:13px" onclick="addPdfItem()">+ Adicionar item</button>
      <div class="modal-section-label">Prazo de entrega</div>
      <div class="form-row"><input class="inp" id="pdf_prazo" value="${o.prazo?new Date(o.prazo+'T12:00:00').toLocaleDateString('pt-BR'):(o.prazoDias?o.prazoDias+' dias':'')}" placeholder="Ex: 15/06/2026 ou 3 dias úteis"></div>
    </div>
    <div class="modal-foot">
      <button class="btn-ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn-save" onclick="gerarPDF()">Gerar PDF</button>
    </div>`);
  drawPdfItens();
}
function drawPdfItens(){
  const box=document.getElementById('pdfItensList');if(!box)return;
  box.innerHTML=pdfItens.map((it,i)=>`
    <div style="display:flex;gap:8px;margin-bottom:8px;align-items:center">
      <input class="inp" value="${esc(it.desc)}" placeholder="Descrição" oninput="pdfItens[${i}].desc=this.value" style="flex:1">
      <input class="inp" type="number" value="${it.qtd}" oninput="pdfItens[${i}].qtd=parseFloat(this.value)||0;sumPdf()" style="width:70px" title="Qtd">
      <div class="inp-prefix" style="width:120px"><span>R$</span><input class="inp" type="number" step="0.01" value="${it.valor}" oninput="pdfItens[${i}].valor=parseFloat(this.value)||0;sumPdf()"></div>
      <button class="act-btn danger" onclick="pdfItens.splice(${i},1);drawPdfItens()" title="Remover"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>`).join('')+`<div style="text-align:right;font-size:14px;font-weight:600;margin-top:6px">Total: <span style="color:var(--brand)" id="pdfTotal">${fmt(pdfItens.reduce((s,it)=>s+it.qtd*it.valor,0))}</span></div>`;
}
function addPdfItem(){pdfItens.push({desc:'',qtd:1,valor:0});drawPdfItens();}
function sumPdf(){const el=document.getElementById('pdfTotal');if(el)el.textContent=fmt(pdfItens.reduce((s,it)=>s+it.qtd*it.valor,0));}

async function gerarPDF(){
  const o=window._pdfOrder, cli=window._pdfCli, e=CONFIG.empresa;
  if(!window.jspdf){toast('Conecte-se à internet para gerar o PDF');return;}
  const prazo=val('pdf_prazo');
  const total=pdfItens.reduce((s,it)=>s+it.qtd*it.valor,0);
  const numOrc='ORC-'+(o.id||'').slice(-6).toUpperCase();
  const { jsPDF }=window.jspdf;
  const doc=new jsPDF({unit:'pt',format:'a4'});
  const W=595.28, H=841.89;
  const ROXO=[102,0,255], CINZA_BLOCO=[228,228,231], CINZA_ITEM=[236,236,238], PRETO=[26,26,26], CINZA_TXT=[136,136,144];
  const yf=pt=>H-pt;
  function img(dataurl,x,y,maxw,maxh){
    if(!dataurl)return false;
    try{
      const fmtImg=dataurl.indexOf('image/png')>=0?'PNG':'JPEG';
      // calcula proporção real da imagem para não esticar
      const props=doc.getImageProperties(dataurl);
      const ratio=props.width/props.height;
      let w=maxw, h=maxw/ratio;
      if(h>maxh){h=maxh;w=maxh*ratio;}
      // centraliza dentro do espaço disponível
      const ox=x+(maxw-w)/2, oy=y+(maxh-h)/2;
      doc.addImage(dataurl,fmtImg,ox,oy,w,h);
      return true;
    }catch(err){return false;}
  }

  // FUNDO BRANCO
  doc.setFillColor(255,255,255);doc.rect(0,0,W,H,'F');

  // FAIXA ROXA TOPO
  doc.setFillColor(...ROXO);doc.rect(0,0,W,200,'F');
  doc.setTextColor(255,255,255);
  doc.setFont('helvetica','bold');doc.setFontSize(16);
  doc.text((e.nome||'Mais Print').toUpperCase(),40,72,{charSpace:1.5});
  // Título com espaçamento moderno
  doc.setFontSize(56);
  doc.text('Orçamento',38,150,{charSpace:-1});

  // CAIXA DO LOGO
  doc.setFillColor(255,255,255);doc.roundedRect(W-160,85,120,60,6,6,'F');
  if(!img(e.logo, W-152, 92, 104, 46)){
    doc.setTextColor(170,170,170);doc.setFont('helvetica','normal');doc.setFontSize(9);
    doc.text('logotipo',W-100,118,{align:'center'});
  }

  // BLOCO CLIENTE
  const bx=40, by=200, bw=360, bh=95;
  doc.setFillColor(...ROXO);doc.roundedRect(bx,by+15,30,bh,12,12,'F');
  doc.setFillColor(...CINZA_BLOCO);doc.roundedRect(bx+15,by+15,bw-15,bh,12,12,'F');
  doc.setTextColor(...CINZA_TXT);doc.setFont('helvetica','bold');doc.setFontSize(9);
  doc.text('CLIENTE',bx+45,by+37);
  doc.setTextColor(...PRETO);doc.setFont('helvetica','bold');doc.setFontSize(16);
  doc.text(cli&&cli.nome?cli.nome:'—',bx+45,by+59);
  doc.setTextColor(85,85,85);doc.setFont('helvetica','italic');doc.setFontSize(8.5);
  let cy=by+75;
  if(cli&&cli.doc){doc.text(cli.doc,bx+45,cy);cy+=12;}
  if(cli&&cli.fone){doc.text(cli.fone,bx+45,cy);}

  // BLOCO PRAZO
  const px=415, py=215, pw=145, ph=80;
  doc.setFillColor(...ROXO);doc.roundedRect(px,py,pw,ph,14,14,'F');
  doc.setTextColor(255,255,255);doc.setFont('helvetica','bold');doc.setFontSize(11);
  doc.text('PRAZO DE ENTREGA',px+pw/2,py+30,{align:'center'});
  doc.setFontSize(16);
  doc.text(prazo||'A combinar',px+pw/2,py+56,{align:'center'});

  // PÍLULA ITENS
  doc.setFillColor(...ROXO);doc.roundedRect(40,362,200,38,16,16,'F');
  doc.setTextColor(255,255,255);doc.setFont('helvetica','bold');doc.setFontSize(13);
  doc.text('ITENS DO ORÇAMENTO',60,386);

  // CABEÇALHO TABELA
  let ty=440;
  doc.setFillColor(...ROXO);doc.roundedRect(40,ty-34,W-80,34,8,8,'F');
  doc.setTextColor(255,255,255);doc.setFont('helvetica','bold');doc.setFontSize(12);
  const col_desc=170, col_qnt=355, col_val=448, col_tot=528;
  doc.text('DESCRIÇÃO',col_desc,ty-12,{align:'center'});
  doc.text('QNT',col_qnt,ty-12,{align:'center'});
  doc.text('VALOR UN',col_val,ty-12,{align:'center'});
  doc.text('TOTAL',col_tot,ty-12,{align:'center'});

  // LINHAS DE ITENS
  let ry=ty, rh=34;
  pdfItens.forEach((it,i)=>{
    const sub=it.qtd*it.valor;
    if(i%2===0){doc.setFillColor(...CINZA_ITEM);doc.roundedRect(48,ry+4,W-96,rh-6,10,10,'F');}
    doc.setTextColor(...PRETO);doc.setFont('helvetica','normal');doc.setFontSize(11);
    let d=String(it.desc); if(d.length>40)d=d.substring(0,38)+'…';
    doc.text(d,col_desc,ry+rh/2+4,{align:'center'});
    doc.text(String(it.qtd),col_qnt,ry+rh/2+4,{align:'center'});
    doc.text(fmt(it.valor),col_val,ry+rh/2+4,{align:'center'});
    doc.setFont('helvetica','bold');
    doc.text(fmt(sub),col_tot,ry+rh/2+4,{align:'center'});
    ry+=rh;
  });

  // VALOR TOTAL (balão roxo)
  ry+=18; const tw=280;
  doc.setFillColor(...ROXO);doc.roundedRect(W-40-tw,ry,tw,38,16,16,'F');
  doc.setTextColor(255,255,255);doc.setFont('helvetica','bold');doc.setFontSize(15);
  doc.text('VALOR TOTAL: '+fmt(total),W-40-tw/2,ry+24,{align:'center'});

  // RODAPÉ ROXO
  doc.setFillColor(...ROXO);doc.rect(0,H-52,W,52,'F');
  doc.setTextColor(255,255,255);doc.setFont('helvetica','bold');doc.setFontSize(12);
  doc.text((e.nome||'Mais Print').toUpperCase(),W/2,H-30,{align:'center'});
  const infoParts=[]; if(e.endereco)infoParts.push(e.endereco); if(e.whatsapp)infoParts.push(e.whatsapp); if(e.instagram)infoParts.push('@'+e.instagram.replace(/^@/,'')); if(e.cnpj)infoParts.push('CNPJ '+e.cnpj);
  if(infoParts.length){doc.setFont('helvetica','normal');doc.setFontSize(8.5);doc.text(infoParts.join('  •  '),W/2,H-16,{align:'center'});}

  // Nome do arquivo: Orcamento-PrimeiroNome-DD-MM-AAAA
  const primNome=(cli&&cli.nome?cli.nome.trim().split(/\s+/)[0]:'SemCliente').replace(/[^a-zA-ZÀ-ú0-9]/g,'');
  const dataArq=new Date().toLocaleDateString('pt-BR').replace(/\//g,'-');
  doc.save(`Orcamento-${primNome}-${dataArq}.pdf`);
  closeModal();
  toast('PDF gerado!');
}

/* ============================================================
   INICIALIZAÇÃO
   ============================================================ */
async function init(){
  applyTheme(localStorage.getItem('mp_theme')||'light');
  try{
    await openDB();
  }catch(err){
    document.getElementById('loginScreen').innerHTML=`
      <div class="login-card" style="text-align:center">
        <div class="login-logo" style="background:#E5484D"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18.36 6.64A9 9 0 1 1 5.64 6.64"/><line x1="12" y1="2" x2="12" y2="12"/></svg></div>
        <h1>Sem conexão</h1>
        <p class="sub" style="margin-bottom:20px">Não consegui conectar ao banco de dados na nuvem. Verifique sua internet e recarregue a página.</p>
        <button class="btn-primary" onclick="location.reload()">Tentar de novo</button>
      </div>`;
    return;
  }
  // Carrega config ou cria a padrão
  CONFIG=await dbGet('config','main');
  if(!CONFIG){ CONFIG=JSON.parse(JSON.stringify(DEFAULT_CONFIG)); await dbPut('config',CONFIG); }
  // Garante campos novos em configs já existentes
  if(!CONFIG.bancos)CONFIG.bancos=[{id:'caixa',nome:'Dinheiro / Caixa'}];
  if(!CONFIG.catReceita)CONFIG.catReceita=['Venda de pedido','Outras receitas'];
  if(!CONFIG.catDespesa)CONFIG.catDespesa=['Compra de material','Despesa fixa','Terceirizado','Brindes/Uso interno','Outras despesas'];
  if(!CONFIG.catDespesa.includes('Brindes/Uso interno'))CONFIG.catDespesa.splice(CONFIG.catDespesa.length-1,0,'Brindes/Uso interno');
  await dbPut('config',CONFIG);
  buildNav();
  renderPage('dashboard');
  // Se já estava logado nesta sessão, pula o login
  if(sessionStorage.getItem('mp_logged')==='1'){
    document.getElementById('loginScreen').style.display='none';
    document.getElementById('app').style.display='flex';
  }
}
init();
</script>
