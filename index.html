<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mais Print — Sistema de Gestão</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
/* ============================================================
   MAIS PRINT — BLOCO 1 (FUNDAÇÃO)
   Tokens de tema: claro e escuro
   ============================================================ */
:root{
  --brand:#6600FF;        /* roxo Mais Print */
  --brand-soft:#8838FF;
  --brand-ink:#5200CC;
  --radius:14px;
  --radius-sm:9px;
  --shadow:0 1px 3px rgba(0,0,0,.06),0 8px 24px rgba(0,0,0,.05);
  --shadow-lg:0 12px 40px rgba(0,0,0,.12);
  --font:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  --trans:.18s cubic-bezier(.4,0,.2,1);
}
/* ----- TEMA CLARO ----- */
[data-theme="light"]{
  --bg:#F6F7F9;
  --bg-grad:linear-gradient(180deg,#F8F9FB 0%,#F1F3F6 100%);
  --surface:#FFFFFF;
  --surface-2:#FAFBFC;
  --surface-3:#F3F5F7;
  --border:#E7EAEE;
  --border-strong:#D8DCE2;
  --text:#1A1D23;
  --text-2:#5A6472;
  --text-3:#8A93A1;
  --nav-bg:rgba(255,255,255,.85);
  --shadow-color:rgba(20,25,35,.06);
}
/* ----- TEMA ESCURO ----- */
[data-theme="dark"]{
  --brand:#8B5CFF;        /* roxo vibrante para fundo escuro */
  --brand-soft:#A87CFF;
  --brand-ink:#A87CFF;
  --bg:#0E1116;
  --bg-grad:linear-gradient(180deg,#11151C 0%,#0C0F14 100%);
  --surface:#171C24;
  --surface-2:#1C222B;
  --surface-3:#222934;
  --border:#283039;
  --border-strong:#333C47;
  --text:#EBEEF2;
  --text-2:#9AA4B2;
  --text-3:#6B7686;
  --nav-bg:rgba(20,25,32,.85);
  --shadow-color:rgba(0,0,0,.4);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:var(--font);
  background:var(--bg-grad);
  color:var(--text);
  font-size:15px;
  line-height:1.5;
  -webkit-font-smoothing:antialiased;
  transition:background var(--trans),color var(--trans);
}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select,textarea{font-family:inherit;font-size:14px}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-thumb{background:var(--border-strong);border-radius:6px}
::-webkit-scrollbar-track{background:transparent}

/* ============================================================
   TELA DE LOGIN
   ============================================================ */
#loginScreen{
  position:fixed;inset:0;z-index:100;
  display:flex;align-items:center;justify-content:center;
  background:var(--bg-grad);padding:20px;
}
.login-card{
  width:100%;max-width:400px;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius);
  box-shadow:var(--shadow-lg);
  padding:40px 36px;
  text-align:center;
  animation:rise .5s cubic-bezier(.16,1,.3,1);
}
@keyframes rise{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.login-logo{
  width:62px;height:62px;margin:0 auto 18px;
  border-radius:16px;
  background:linear-gradient(135deg,var(--brand),var(--brand-soft));
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 8px 20px rgba(102,0,255,.35);
}
.login-logo svg{width:32px;height:32px;stroke:#fff}
.login-card h1{font-size:22px;font-weight:700;letter-spacing:-.02em;margin-bottom:4px}
.login-card .sub{color:var(--text-2);font-size:13.5px;margin-bottom:28px}
.field{text-align:left;margin-bottom:16px}
.field label{display:block;font-size:12.5px;font-weight:600;color:var(--text-2);margin-bottom:6px}
.field input{
  width:100%;padding:11px 13px;
  background:var(--surface-2);
  border:1px solid var(--border-strong);
  border-radius:var(--radius-sm);
  color:var(--text);outline:none;
  transition:border var(--trans),box-shadow var(--trans);
}
.field input:focus{border-color:var(--brand);box-shadow:0 0 0 3px rgba(102,0,255,.15)}
.btn-primary{
  width:100%;padding:12px;margin-top:6px;
  background:linear-gradient(135deg,var(--brand),var(--brand-soft));
  color:#fff;font-weight:600;font-size:15px;
  border-radius:var(--radius-sm);
  transition:transform var(--trans),box-shadow var(--trans);
  box-shadow:0 4px 14px rgba(102,0,255,.3);
}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(102,0,255,.4)}
.btn-primary:active{transform:translateY(0)}
.login-hint{margin-top:18px;font-size:12px;color:var(--text-3)}
.login-err{color:#E5484D;font-size:12.5px;margin-top:10px;min-height:16px}

/* ============================================================
   APP SHELL
   ============================================================ */
#app{display:none;min-height:100vh;flex-direction:column}
.topbar{
  position:sticky;top:0;z-index:40;
  background:var(--nav-bg);
  backdrop-filter:saturate(180%) blur(16px);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:18px;
  padding:0 22px;height:60px;
}
.brand{display:flex;align-items:center;gap:11px;font-weight:700;font-size:16px;letter-spacing:-.02em;white-space:nowrap}
.brand-mark{
  width:32px;height:32px;border-radius:9px;
  background:linear-gradient(135deg,var(--brand),var(--brand-soft));
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  box-shadow:0 3px 8px rgba(102,0,255,.3);
}
.brand-mark svg{width:18px;height:18px;stroke:#fff}
.nav{display:flex;gap:2px;margin-left:8px;overflow-x:auto;flex:1}
.nav::-webkit-scrollbar{height:0}
.nav-item{
  display:flex;align-items:center;gap:7px;
  padding:8px 13px;border-radius:9px;
  color:var(--text-2);font-size:13.5px;font-weight:500;
  white-space:nowrap;transition:all var(--trans);position:relative;
}
.nav-item svg{width:16px;height:16px;stroke:currentColor;flex-shrink:0}
.nav-item:hover{background:var(--surface-3);color:var(--text)}
.nav-item.active{background:var(--brand);color:#fff;box-shadow:0 2px 8px rgba(102,0,255,.3)}
.topbar-right{display:flex;align-items:center;gap:8px;margin-left:auto}
.icon-btn{
  width:38px;height:38px;border-radius:9px;
  display:flex;align-items:center;justify-content:center;
  color:var(--text-2);border:1px solid var(--border);
  background:var(--surface);transition:all var(--trans);
}
.icon-btn svg{width:18px;height:18px;stroke:currentColor}
.icon-btn:hover{color:var(--text);border-color:var(--border-strong);background:var(--surface-3)}

/* ============================================================
   ÁREA DE CONTEÚDO
   ============================================================ */
.main{flex:1;padding:26px 22px;max-width:1180px;width:100%;margin:0 auto}
.page{display:none;animation:fade .25s ease}
.page.active{display:block}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.page-head{margin-bottom:22px}
.page-head h2{font-size:24px;font-weight:700;letter-spacing:-.025em;display:flex;align-items:center;gap:10px}
.page-head .desc{color:var(--text-2);font-size:14px;margin-top:3px}

.card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius);
  box-shadow:var(--shadow);
  padding:22px;margin-bottom:18px;
}
.card-title{font-size:16px;font-weight:650;margin-bottom:4px;display:flex;align-items:center;gap:9px}
.card-title svg{width:18px;height:18px;stroke:var(--brand)}
.card-sub{color:var(--text-2);font-size:13px;margin-bottom:18px}

/* Placeholder de "em breve" para módulos futuros */
.soon{
  text-align:center;padding:60px 20px;color:var(--text-3);
}
.soon svg{width:46px;height:46px;stroke:var(--text-3);margin-bottom:14px}
.soon h3{font-size:17px;font-weight:600;color:var(--text-2);margin-bottom:6px}
.soon p{font-size:13.5px;max-width:380px;margin:0 auto}
.soon .tag{
  display:inline-block;margin-top:16px;padding:5px 12px;
  background:rgba(102,0,255,.12);color:var(--brand-ink);
  border-radius:20px;font-size:12px;font-weight:600;
}
[data-theme="dark"] .soon .tag{color:var(--brand-soft)}

/* ============================================================
   FORMULÁRIOS (Configurações)
   ============================================================ */
.form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px}
.form-row{display:flex;flex-direction:column;gap:6px}
.form-row label{font-size:12.5px;font-weight:600;color:var(--text-2)}
.form-row .help{font-size:11.5px;color:var(--text-3);font-weight:400}
.inp{
  padding:10px 12px;
  background:var(--surface-2);
  border:1px solid var(--border-strong);
  border-radius:var(--radius-sm);
  color:var(--text);outline:none;width:100%;
  transition:border var(--trans),box-shadow var(--trans);
}
.inp:focus{border-color:var(--brand);box-shadow:0 0 0 3px rgba(102,0,255,.15)}
.inp-prefix{position:relative}
.inp-prefix span{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text-3);font-size:14px;pointer-events:none}
.inp-prefix .inp{padding-left:30px}

.calc-box{
  background:var(--surface-3);
  border:1px dashed var(--border-strong);
  border-radius:var(--radius-sm);
  padding:16px;margin-top:4px;
}
.calc-box .label{font-size:12px;color:var(--text-2);font-weight:500}
.calc-box .val{font-size:26px;font-weight:700;color:var(--brand);letter-spacing:-.02em;margin-top:2px}
.calc-box .note{font-size:11.5px;color:var(--text-3);margin-top:4px}

.section-divider{height:1px;background:var(--border);margin:22px 0}
.btn-save{
  background:linear-gradient(135deg,var(--brand),var(--brand-soft));
  color:#fff;font-weight:600;padding:11px 22px;
  border-radius:var(--radius-sm);font-size:14px;
  transition:transform var(--trans),box-shadow var(--trans);
  box-shadow:0 4px 14px rgba(102,0,255,.28);
}
.btn-save:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(102,0,255,.38)}

/* Sub-abas dentro de Configurações */
.subtabs{display:flex;gap:4px;margin-bottom:20px;flex-wrap:wrap;border-bottom:1px solid var(--border);padding-bottom:0}
.subtab{
  padding:9px 15px;border-radius:9px 9px 0 0;
  color:var(--text-2);font-size:13.5px;font-weight:500;
  border-bottom:2px solid transparent;margin-bottom:-1px;transition:all var(--trans);
}
.subtab:hover{color:var(--text);background:var(--surface-3)}
.subtab.active{color:var(--brand);border-bottom-color:var(--brand);font-weight:600}
.subpage{display:none}
.subpage.active{display:block;animation:fade .2s ease}

/* Toast de confirmação */
#toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);
  background:var(--text);color:var(--bg);
  padding:12px 22px;border-radius:10px;font-size:14px;font-weight:500;
  box-shadow:var(--shadow-lg);opacity:0;pointer-events:none;
  transition:all .3s cubic-bezier(.16,1,.3,1);z-index:200;
  display:flex;align-items:center;gap:9px;
}
#toast svg{width:17px;height:17px;stroke:var(--brand)}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ============================================================
   COMPONENTES DE CADASTRO (Bloco 2): tabela, modal, busca
   ============================================================ */
.page-head-row{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:22px}
.btn-add{
  background:linear-gradient(135deg,var(--brand),var(--brand-soft));
  color:#fff;font-weight:600;padding:10px 18px;border-radius:var(--radius-sm);
  font-size:14px;display:flex;align-items:center;gap:7px;white-space:nowrap;
  transition:transform var(--trans),box-shadow var(--trans);box-shadow:0 4px 14px rgba(102,0,255,.28);
}
.btn-add:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(102,0,255,.38)}
.btn-add svg{width:17px;height:17px;stroke:#fff}

.toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:16px}
.search-box{position:relative;flex:1;min-width:200px}
.search-box svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);width:16px;height:16px;stroke:var(--text-3)}
.search-box input{width:100%;padding:10px 12px 10px 36px;background:var(--surface);border:1px solid var(--border-strong);border-radius:var(--radius-sm);color:var(--text);outline:none;transition:border var(--trans)}
.search-box input:focus{border-color:var(--brand)}

.tbl-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
.tbl-scroll{overflow-x:auto}
table{width:100%;border-collapse:collapse}
thead th{
  text-align:left;font-size:11.5px;font-weight:650;text-transform:uppercase;letter-spacing:.04em;
  color:var(--text-3);padding:13px 16px;border-bottom:1px solid var(--border);background:var(--surface-2);white-space:nowrap;
}
tbody td{padding:13px 16px;border-bottom:1px solid var(--border);font-size:14px;vertical-align:middle}
tbody tr:last-child td{border-bottom:none}
tbody tr{transition:background var(--trans)}
tbody tr:hover{background:var(--surface-2)}
.t-main{font-weight:600;color:var(--text)}
.t-sub{font-size:12.5px;color:var(--text-3);margin-top:1px}
.t-right{text-align:right}
.t-actions{display:flex;gap:6px;justify-content:flex-end}
.act-btn{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;color:var(--text-2);border:1px solid var(--border);background:var(--surface);transition:all var(--trans)}
.act-btn svg{width:15px;height:15px;stroke:currentColor}
.act-btn:hover{background:var(--surface-3);color:var(--text)}
.act-btn.danger:hover{background:rgba(229,72,77,.1);color:#E5484D;border-color:rgba(229,72,77,.3)}

.badge{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:20px;font-size:11.5px;font-weight:600;background:var(--surface-3);color:var(--text-2)}
.badge.brand{background:rgba(102,0,255,.12);color:var(--brand-ink)}
[data-theme="dark"] .badge.brand{color:var(--brand-soft)}
.badge.green{background:rgba(34,160,90,.14);color:#1A8A4E}
[data-theme="dark"] .badge.green{color:#4ADE80}
.badge.blue{background:rgba(40,110,220,.13);color:#2563C9}
[data-theme="dark"] .badge.blue{color:#7AB0FF}

.empty-state{text-align:center;padding:54px 20px;color:var(--text-3)}
.empty-state svg{width:42px;height:42px;stroke:var(--text-3);margin-bottom:12px;opacity:.7}
.empty-state h3{font-size:15.5px;font-weight:600;color:var(--text-2);margin-bottom:5px}
.empty-state p{font-size:13px;max-width:340px;margin:0 auto}

/* Modal (janela de cadastro) */
.modal-bg{
  position:fixed;inset:0;z-index:80;background:rgba(10,12,16,.55);
  backdrop-filter:blur(3px);display:flex;align-items:flex-start;justify-content:center;
  padding:40px 16px;overflow-y:auto;opacity:0;pointer-events:none;transition:opacity .2s ease;
}
.modal-bg.show{opacity:1;pointer-events:auto}
.modal{
  width:100%;max-width:560px;background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);box-shadow:var(--shadow-lg);padding:0;
  transform:translateY(12px);transition:transform .25s cubic-bezier(.16,1,.3,1);margin:auto 0;
}
.modal-bg.show .modal{transform:translateY(0)}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:20px 24px;border-bottom:1px solid var(--border)}
.modal-head h3{font-size:17px;font-weight:650}
.modal-head .close{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;color:var(--text-2);transition:all var(--trans)}
.modal-head .close:hover{background:var(--surface-3);color:var(--text)}
.modal-head .close svg{width:18px;height:18px;stroke:currentColor}
.modal-body{padding:22px 24px;max-height:64vh;overflow-y:auto}
.modal-foot{display:flex;gap:10px;justify-content:flex-end;padding:16px 24px;border-top:1px solid var(--border)}
.btn-ghost{padding:10px 18px;border-radius:var(--radius-sm);font-weight:600;font-size:14px;color:var(--text-2);border:1px solid var(--border-strong);background:var(--surface);transition:all var(--trans)}
.btn-ghost:hover{background:var(--surface-3);color:var(--text)}
.modal-section-label{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--text-3);margin:22px 0 12px}
.modal-section-label:first-child{margin-top:0}
.radio-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:8px}
.radio-opt{border:1.5px solid var(--border-strong);border-radius:var(--radius-sm);padding:11px 13px;cursor:pointer;transition:all var(--trans);background:var(--surface-2)}
.radio-opt:hover{border-color:var(--brand-soft)}
.radio-opt.sel{border-color:var(--brand);background:rgba(102,0,255,.07)}
.radio-opt .ro-title{font-weight:600;font-size:13.5px;display:flex;align-items:center;gap:7px}
.radio-opt .ro-desc{font-size:11.5px;color:var(--text-3);margin-top:3px}
.kpi-row{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:18px}
.kpi{flex:1;min-width:150px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:15px 17px;box-shadow:var(--shadow)}
.kpi .k-label{font-size:12px;color:var(--text-2);font-weight:500;display:flex;align-items:center;gap:6px}
.kpi .k-label svg{width:14px;height:14px;stroke:var(--text-3)}
.kpi .k-val{font-size:22px;font-weight:700;letter-spacing:-.02em;margin-top:4px}

/* ============================================================
   PRECIFICAÇÃO (Bloco 3)
   ============================================================ */
.mode-switch{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
.mode-card{
  flex:1;min-width:220px;border:1.5px solid var(--border-strong);border-radius:var(--radius);
  padding:18px;cursor:pointer;background:var(--surface);transition:all var(--trans);text-align:left;
}
.mode-card:hover{border-color:var(--brand-soft);transform:translateY(-1px)}
.mode-card.sel{border-color:var(--brand);background:rgba(102,0,255,.05);box-shadow:0 4px 16px rgba(102,0,255,.12)}
.mode-card .mc-icon{width:38px;height:38px;border-radius:10px;background:rgba(102,0,255,.1);display:flex;align-items:center;justify-content:center;margin-bottom:11px}
.mode-card .mc-icon svg{width:20px;height:20px;stroke:var(--brand)}
.mode-card h4{font-size:15.5px;font-weight:650;margin-bottom:4px}
.mode-card p{font-size:12.5px;color:var(--text-2);line-height:1.45}

.price-layout{display:grid;grid-template-columns:1fr 320px;gap:20px;align-items:start}
.price-summary{position:sticky;top:78px}
.sum-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
.sum-head{padding:16px 18px;border-bottom:1px solid var(--border);background:var(--surface-2)}
.sum-head h4{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--text-3)}
.sum-body{padding:16px 18px}
.sum-line{display:flex;justify-content:space-between;align-items:baseline;padding:7px 0;font-size:13.5px}
.sum-line .sl-label{color:var(--text-2)}
.sum-line .sl-val{font-weight:600;font-variant-numeric:tabular-nums}
.sum-divider{height:1px;background:var(--border);margin:8px 0}
.sum-total{display:flex;justify-content:space-between;align-items:baseline;padding-top:10px}
.sum-total .st-label{font-size:13px;color:var(--text-2);font-weight:600}
.sum-total .st-val{font-size:27px;font-weight:750;color:var(--brand);letter-spacing:-.02em;font-variant-numeric:tabular-nums}
.sum-margin{margin-top:6px;font-size:12px;color:var(--text-3);text-align:right}

.item-add-row{display:flex;gap:9px;align-items:flex-end;flex-wrap:wrap}
.item-add-row .form-row{flex:1;min-width:130px}
.btn-mini{background:var(--brand);color:#fff;font-weight:600;padding:10px 15px;border-radius:var(--radius-sm);font-size:13.5px;white-space:nowrap;transition:all var(--trans)}
.btn-mini:hover{background:var(--brand-soft)}
.btn-mini svg{width:15px;height:15px;stroke:#fff;vertical-align:-2px}

.sel-item{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid var(--border)}
.sel-item:last-child{border-bottom:none}
.sel-item .si-info{flex:1;min-width:0}
.sel-item .si-name{font-weight:600;font-size:14px}
.sel-item .si-detail{font-size:12px;color:var(--text-3);margin-top:1px}
.sel-item .si-val{font-weight:650;font-variant-numeric:tabular-nums;white-space:nowrap}
.sel-item .si-del{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;color:var(--text-3);transition:all var(--trans);flex-shrink:0}
.sel-item .si-del:hover{background:rgba(229,72,77,.1);color:#E5484D}
.sel-item .si-del svg{width:14px;height:14px;stroke:currentColor}

/* ============================================================
   BANCO DE DADOS NA NUVEM (Supabase)
   Guarda tudo online, sincronizado entre dispositivos.
   As funções dbPut/dbGet/dbAll/dbDel mantêm os mesmos nomes,
   então o resto do sistema funciona sem alteração.
   ============================================================ */
const SUPABASE_URL='https://zawoscggkoymublgqfnt.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inphd29zY2dna295bXVibGdxZm50Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODExOTE0ODIsImV4cCI6MjA5Njc2NzQ4Mn0.G7R-rIQErCKyTyeDzxXD7gp5KkHF7HnWy4OVgtDUH5M';
const SB_HEADERS={
  'apikey':SUPABASE_KEY,
  'Authorization':'Bearer '+SUPABASE_KEY,
  'Content-Type':'application/json'
};
const REST=SUPABASE_URL+'/rest/v1/dados';
let db='supabase'; // mantém compatibilidade com checagens "if(!db)"

// Cache local em memória para velocidade (espelho do que está na nuvem)
const _cache={};

function openDB(){
  // Carrega todos os dados da nuvem uma vez para o cache
  return fetch(REST+'?select=*',{headers:SB_HEADERS})
    .then(r=>{ if(!r.ok) throw new Error('Falha ao conectar ('+r.status+')'); return r.json(); })
    .then(rows=>{
      rows.forEach(row=>{
        if(!_cache[row.tipo])_cache[row.tipo]={};
        _cache[row.tipo][row.id]=row.conteudo;
      });
      return true;
    });
}

async function dbPut(store,obj){
  if(!obj.id)obj.id=uid();
  // grava na nuvem (upsert)
  const body=[{tipo:store,id:String(obj.id),conteudo:obj,atualizado_em:new Date().toISOString()}];
  const r=await fetch(REST,{
    method:'POST',
    headers:{...SB_HEADERS,'Prefer':'resolution=merge-duplicates'},
    body:JSON.stringify(body)
  });
  if(!r.ok){const t=await r.text();throw new Error('Erro ao salvar: '+t);}
  // atualiza cache
  if(!_cache[store])_cache[store]={};
  _cache[store][String(obj.id)]=obj;
  return obj;
}

async function dbGet(store,id){
  // tenta do cache primeiro
  if(_cache[store]&&_cache[store][String(id)]!==undefined)return _cache[store][String(id)];
  // busca na nuvem
  const r=await fetch(REST+`?tipo=eq.${encodeURIComponent(store)}&id=eq.${encodeURIComponent(id)}&select=conteudo`,{headers:SB_HEADERS});
  if(!r.ok)return undefined;
  const rows=await r.json();
  if(rows.length===0)return undefined;
  if(!_cache[store])_cache[store]={};
  _cache[store][String(id)]=rows[0].conteudo;
  return rows[0].conteudo;
}

async function dbAll(store){
  // se já temos no cache, retorna do cache
  if(_cache[store])return Object.values(_cache[store]);
  const r=await fetch(REST+`?tipo=eq.${encodeURIComponent(store)}&select=id,conteudo`,{headers:SB_HEADERS});
  if(!r.ok)return [];
  const rows=await r.json();
  _cache[store]={};
  rows.forEach(row=>{_cache[store][row.id]=row.conteudo;});
  return Object.values(_cache[store]);
}

async function dbDel(store,id){
  const r=await fetch(REST+`?tipo=eq.${encodeURIComponent(store)}&id=eq.${encodeURIComponent(id)}`,{
    method:'DELETE',headers:SB_HEADERS
  });
  if(_cache[store])delete _cache[store][String(id)];
  return r.ok;
}

async function doLogin(){
  const u=document.getElementById('loginUser').value.trim().toLowerCase();
  const p=document.getElementById('loginPass').value;
  const err=document.getElementById('loginErr');
  // Garante banco aberto
  if(!db)await openDB();
  let users=await dbAll('users');
  // Primeiro acesso: cria admin padrão
  if(users.length===0){
    await dbPut('users',{id:'admin',usuario:'admin',senha:'1234',nome:'Administrador',criadoEm:Date.now()});
    users=await dbAll('users');
  }
  const found=users.find(x=>x.usuario===u && x.senha===p);
  if(found){
    sessionStorage.setItem('mp_logged','1');
    sessionStorage.setItem('mp_user',found.id);
    document.getElementById('loginScreen').style.display='none';
    document.getElementById('app').style.display='flex';
    err.textContent='';
  }else{
    err.textContent='Usuário ou senha incorretos.';
  }
}
function doLogout(){
  sessionStorage.removeItem('mp_logged');
  sessionStorage.removeItem('mp_user');
  document.getElementById('app').style.display='none';
  document.getElementById('loginScreen').style.display='flex';
  document.getElementById('loginPass').value='';
}
// Permite logar com Enter

let logoTmp=null;
// Encolhe a imagem para um tamanho leve antes de salvar na nuvem
function resizeImage(file,maxW,maxH,cb){
  const reader=new FileReader();
  reader.onload=e=>{
    const img=new Image();
    img.onload=()=>{
      let w=img.width,h=img.height;
      const ratio=Math.min(maxW/w,maxH/h,1);
      w=Math.round(w*ratio);h=Math.round(h*ratio);
      const canvas=document.createElement('canvas');
      canvas.width=w;canvas.height=h;
      const ctx=canvas.getContext('2d');
      ctx.drawImage(img,0,0,w,h);
      // PNG preserva transparência (importante para logo)
      const isPng=file.type.indexOf('png')>=0;
      const out=isPng?canvas.toDataURL('image/png'):canvas.toDataURL('image/jpeg',0.85);
      cb(out);
    };
    img.src=e.target.result;
  };
  reader.readAsDataURL(file);
}
function handleLogo(ev){
  const file=ev.target.files[0];if(!file)return;
  if(file.size>5*1024*1024){toast('Imagem muito grande (máx 5MB)');return;}
  resizeImage(file,500,500,out=>{
    logoTmp=out;
    document.getElementById('logoPreview').innerHTML=`<img src="${logoTmp}" style="max-width:100%;max-height:100%;object-fit:contain">`;
    toast('Logo carregado — clique em Salvar dados');
  });
}

  logoTmp='';
  CONFIG.empresa.logo='';
  dbPut('config',CONFIG);
  goSub('empresa');

/* ---------- Cálculos e ações de Configurações ---------- */
function fmt(v){return 'R$ '+Number(v||0).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});}

function recalcHora(){
  const pl=parseFloat(document.getElementById('cfg_proLabore').value)||0;
  const di=parseFloat(document.getElementById('cfg_diasUteis').value)||1;
  const ho=parseFloat(document.getElementById('cfg_horasDia').value)||1;
  const totalHoras=di*ho;
  const valorHora=pl/totalHoras;
  document.getElementById('calcHora').textContent=fmt(valorHora);
  document.getElementById('calcHoraNote').textContent=`${pl>0?fmt(pl):'R$ 0,00'} ÷ (${di} dias × ${ho}h = ${totalHoras}h no mês)`;
}

function bindSettings(){
  // Sempre prepara a cópia de trabalho das despesas ao abrir Configurações
  despesasTmp=JSON.parse(JSON.stringify(CONFIG.despesasFixas||[]));
  if(settingsSub==='operacao') recalcHora();
  if(settingsSub==='despesas') renderDespesaList();
}

  const box=document.getElementById('despList');
  if(!box)return;
  box.innerHTML=despesasTmp.map((d,i)=>`
    <div style="display:flex;gap:10px;margin-bottom:10px;align-items:center">

      <div class="inp-prefix" style="width:150px"><span>R$</span><input class="inp" type="number" value="${d.valor}" oninput="despesasTmp[${i}].valor=parseFloat(this.value)||0;sumDesp()"></div>
      <button class="icon-btn" onclick="despesasTmp.splice(${i},1);drawDespesas()" title="Remover" style="flex-shrink:0">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
      </button>
    </div>`).join('')||'<p style="color:var(--text-3);font-size:13px;padding:8px 0">Nenhuma despesa cadastrada ainda.</p>';

function sumDesp(){
  const tot=despesasTmp.reduce((s,d)=>s+(parseFloat(d.valor)||0),0);

  let u={id:'',usuario:'',senha:'',nome:''};
  if(id){const found=await dbGet('users',id);if(found)u=found;}
  openModal(`
    <div class="modal-head">

async function saveUser(){
  const usuario=val('u_usuario').toLowerCase(), senha=val('u_senha');
  if(!usuario){toast('Informe o usuário');return;}
  if(!senha){toast('Informe a senha');return;}
  // Verifica usuário duplicado
  const all=await dbAll('users');
  const dup=all.find(x=>x.usuario===usuario && x.id!==val('u_id'));
  if(dup){toast('Já existe um usuário com esse login');return;}
  const id=val('u_id')||uid();
  await dbPut('users',{id,usuario,senha,nome:val('u_nome'),criadoEm:Date.now()});
  closeModal();toast('Usuário salvo');drawUsuarios();
}
async function delUser(id){
  const all=await dbAll('users');
  if(all.length<=1){toast('Não dá para excluir o único usuário');return;}
  if(id===sessionStorage.getItem('mp_user')){toast('Você não pode excluir a si mesmo enquanto está logado');return;}
  if(!confirm('Excluir este usuário?'))return;
  await dbDel('users',id);
  toast('Usuário excluído');drawUsuarios();
}

      <div class="form-grid">
        <div class="form-row"><label>Quantidade atual em estoque</label><input class="inp" type="number" step="0.01" id="m_estoqueAtual" value="${m.estoque||0}" placeholder="0"><span class="help">Quanto você tem disponível agora.</span></div>

function selMatTipo(k){
  matTipo=k;
  document.querySelectorAll('#m_tipoGrid .radio-opt').forEach(o=>o.classList.toggle('sel',o.dataset.tipo===k));
  document.getElementById('m_qtdLabel').textContent=MAT_TIPOS[k].compraLabel+' *';
  document.getElementById('m_usoLabel').textContent=MAT_TIPOS[k].usoLabel;
  recalcMat();
}
function recalcMat(){
  const valor=num('m_valor'), qtd=num('m_qtd');
  const custo=qtd>0?valor/qtd:0;
  document.getElementById('m_custoCalc').textContent=fmt6(custo);
  const t=MAT_TIPOS[matTipo];
  document.getElementById('m_calcNote').textContent=valor>0&&qtd>0?`${fmt(valor)} ÷ ${qtd} ${t.usoLabel}${qtd>1?'s':''} = ${fmt6(custo)} por ${t.usoLabel}`:'Preencha o valor e a quantidade.';
}
async function saveMaterial(){
  const nome=val('m_nome');
  if(!nome){toast('Informe o nome do material');document.getElementById('m_nome').focus();return;}
  const valor=num('m_valor'), qtd=num('m_qtd');
  if(qtd<=0){toast('Informe a quantidade comprada');return;}
  const custoUnit=valor/qtd;
  const id=val('m_id')||uid();
  const sel=document.getElementById('m_forn');
  await dbPut('materials',{id,nome,marca:val('m_marca'),fornecedorId:sel?sel.value:'',tipo:matTipo,
    valorCompra:valor,qtdCompra:qtd,custoUnit,
    estoque:num('m_estoqueAtual'),estoqueMin:num('m_estoqueMin')});
  closeModal();toast('Material salvo');drawMaterials();
}
async function delMaterial(id,nome){
  if(!confirm(`Excluir o material "${nome}"?`))return;
  await dbDel('materials',id);
  toast('Material excluído');drawMaterials();
}

        <div class="val" id="s_atual">${(m.estoque||0).toLocaleString('pt-BR')} <span style="font-size:15px;color:var(--text-2)">${t.usoLabel}${(m.estoque||0)!==1?'s':''}</span></div>

        </div>
        <div class="radio-opt" id="s_optOut" onclick="setStockDir('out')">
          <div class="ro-title">↓ Baixa</div><div class="ro-desc">Usei / perdi / ajuste</div>
        </div>
      </div>
      <div class="form-row" style="margin-top:14px"><label>Quantidade (em ${t.usoLabel}s)</label><input class="inp" type="number" step="0.01" id="s_qtd" placeholder="0" autofocus></div>
    </div>
    <div class="modal-foot">
      <button class="btn-ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn-save" onclick="applyStock()">Registrar</button>
    </div>`);
  window._stockDir='in';
  setTimeout(()=>document.getElementById('s_qtd').focus(),100);
}
function setStockDir(d){
  window._stockDir=d;
  document.getElementById('s_optIn').classList.toggle('sel',d==='in');
  document.getElementById('s_optOut').classList.toggle('sel',d==='out');
}
async function applyStock(){
  const id=val('s_id'), qtd=num('s_qtd');
  if(qtd<=0){toast('Informe uma quantidade');return;}
  const m=await dbGet('materials',id);
  const atual=m.estoque||0;
  const novo=window._stockDir==='in'?atual+qtd:Math.max(0,atual-qtd);
  m.estoque=novo;
  await dbPut('materials',m);
  closeModal();toast(`Estoque atualizado: ${novo.toLocaleString('pt-BR')}`);drawMaterials();
}

function recalcEquip(){
  const aquis=num('e_aquis'), revenda=num('e_revenda'), anos=num('e_anos'), diasAno=num('e_diasAno'), horasDia=num('e_horasDia');
  const totalHoras=anos*diasAno*horasDia;
  const deprec=totalHoras>0?Math.max(0,(aquis-revenda))/totalHoras:0;
  document.getElementById('e_deprecCalc').textContent=fmt6(deprec);
  document.getElementById('e_deprecNote').textContent=totalHoras>0&&aquis>0
    ? `(${fmt(aquis)} − ${fmt(revenda)}) ÷ ${totalHoras.toLocaleString('pt-BR')}h de vida útil`
    : 'Preencha o valor pago e a vida útil.';
  if(document.getElementById('e_temTinta').checked){
    const cPB=num('e_rendPB')>0?num('e_refilPB')/num('e_rendPB'):0;
    const cCor=num('e_rendCor')>0?num('e_refilCor')/num('e_rendCor'):0;
    const pb=document.getElementById('e_custoPB'), cor=document.getElementById('e_custoCor');
    if(pb)pb.textContent=fmt6(cPB);
    if(cor)cor.textContent=fmt6(cCor);
  }

  const aquis=num('e_aquis'), revenda=num('e_revenda'), anos=num('e_anos'), diasAno=num('e_diasAno'), horasDia=num('e_horasDia');
  const totalHoras=anos*diasAno*horasDia;
  const deprecHora=totalHoras>0?Math.max(0,(aquis-revenda))/totalHoras:0;
  const temTinta=document.getElementById('e_temTinta').checked;
  const custoPB=temTinta&&num('e_rendPB')>0?num('e_refilPB')/num('e_rendPB'):0;

/* ============================================================
   MÓDULO: PRECIFICAÇÃO (Bloco 3)
   Dois modos (rápido e avançado) sobre o mesmo motor de cálculo.
   ============================================================ */
let priceMode=null; // 'rapido' | 'avancado'
let orc=null;       // orçamento em montagem
function resetOrc(){ orc=novoOrc(); }

function novoOrc(){
  return {
    clienteId:'', descricao:'', cestaQtd:1,
    materiais:[],   // {matId, nome, tipo, custoUnit, qtd}
    equipamentos:[],// {eqId, nome, tipo:'tempo'|'pb'|'cor', minutos, paginas, deprecHora, custoPB, custoCor}
    maoObraMin:0,   // minutos de trabalho manual
    acabamentos:[], // {nome, valor}
    margem: CONFIG?CONFIG.operacao.margemPadrao:50,
    rateioFixo:true,// diluir despesa fixa
    // arte (rápido/avançado): cobrança opcional de criação de arte
    temArte:false, arteCobMod:'fixo', arteCobValor:0, arteCobMin:0,
    // terceirizado:
    custoSite:0,       // o que você paga no site
    arteMod:'fixo',    // 'fixo' | 'tempo'
    arteValor:0,       // valor fixo da arte
    arteMin:0,         // minutos de arte (se por tempo)
    lucroFixo:0,       // lucro fixo definido por você
    prazoDias:0        // dias prometidos pelo site
  };
}

/* ---------- MOTOR DE CÁLCULO (coração do sistema) ---------- */
function calcOrc(o){
  const op=CONFIG.operacao;
  const valorHora = (op.diasUteis*op.horasDia)>0 ? op.proLabore/(op.diasUteis*op.horasDia) : 0;

  // ===== MODO TERCEIRIZADO: lógica própria =====
  if(o.modo==='terceirizado'||priceMode==='terceirizado'){
    const custoSite=o.custoSite||0;
    const custoArte = o.arteMod==='tempo' ? valorHora*((o.arteMin||0)/60) : (o.arteValor||0);
    const custoTotal=custoSite+custoArte;
    const lucro=o.lucroFixo||0;
    const precoFinal=custoTotal+lucro;
    const margemReal = precoFinal>0 ? (lucro/precoFinal)*100 : 0;
    return {custoMat:0,custoEquip:0,custoMO:0,custoAcab:0,custoFixo:0,
            custoSite,custoArte,custoTotal,precoFinal,lucro,margem:margemReal,valorHora,terceirizado:true};
  }

  // ===== MODOS RÁPIDO E AVANÇADO =====
  // 1) Materiais
  let custoMat=0;
  o.materiais.forEach(m=>{ custoMat += (m.custoUnit||0)*(m.qtd||0); });

  // 2) Equipamentos (depreciação por tempo + tinta por página)
  let custoEquip=0;
  o.equipamentos.forEach(e=>{
    if(e.tipo==='tempo'){ custoEquip += (e.deprecHora||0)*((e.minutos||0)/60); }
    else if(e.tipo==='pb'){ custoEquip += (e.custoPB||0)*(e.paginas||0); }
    else if(e.tipo==='cor'){ custoEquip += (e.custoCor||0)*(e.paginas||0); }
  });

  // 3) Mão de obra (valor da hora × tempo)
  const custoMO = valorHora*((o.maoObraMin||0)/60);

  // 3b) Arte (cobrança opcional: fixa ou por tempo)
  let custoArteProp=0;
  if(o.temArte){
    custoArteProp = o.arteCobMod==='tempo' ? valorHora*((o.arteCobMin||0)/60) : (o.arteCobValor||0);
  }

  // 4) Acabamentos
  let custoAcab=0;
  o.acabamentos.forEach(a=>{ custoAcab += (a.valor||0); });

  // 5) Rateio de despesa fixa (custo fixo diluído por hora trabalhada no mês)
  let custoFixo=0;
  if(o.rateioFixo){
    const totalFixo=(CONFIG.despesasFixas||[]).reduce((s,d)=>s+(parseFloat(d.valor)||0),0);
    const horasMes=op.diasUteis*op.horasDia;
    const fixoHora = horasMes>0 ? totalFixo/horasMes : 0;
    let minutosTotais=(o.maoObraMin||0)+(o.temArte&&o.arteCobMod==='tempo'?(o.arteCobMin||0):0);
    o.equipamentos.forEach(e=>{ if(e.tipo==='tempo') minutosTotais+=(e.minutos||0); });
    custoFixo = fixoHora*(minutosTotais/60);
  }

  const custoTotal = custoMat+custoEquip+custoMO+custoArteProp+custoAcab+custoFixo;
  const margem = o.margem||0;
  const precoFinal = margem<100 ? custoTotal/(1-margem/100) : custoTotal;
  const lucro = precoFinal-custoTotal;

  return {custoMat,custoEquip,custoMO,custoArteProp,custoAcab,custoFixo,custoTotal,precoFinal,lucro,margem,valorHora};
}

/* ---------- Seletor de materiais ---------- */
async function drawMatPicker(){
  const mats=(await dbAll('materials')).sort((a,b)=>(a.nome||'').localeCompare(b.nome||''));
  const box=document.getElementById('matPicker');if(!box)return;
  if(mats.length===0){box.innerHTML=`<p style="color:var(--text-3);font-size:13px">Nenhum material cadastrado. Vá em Materiais primeiro.</p>`;return;}
  const opts=mats.map(m=>`<option value="${m.id}">${esc(m.nome)} — ${fmt6(m.custoUnit)}/${(MAT_TIPOS[m.tipo]||MAT_TIPOS.folha).usoLabel}</option>`).join('');
  box.innerHTML=`<div class="item-add-row">
    <div class="form-row"><label>Material</label><select class="inp" id="mp_sel">${opts}</select></div>
    <div class="form-row" style="max-width:120px"><label>Quantidade</label><input class="inp" type="number" step="0.01" id="mp_qtd" placeholder="0"></div>
    <button class="btn-mini" onclick="addMatItem()">+ Adicionar</button>
  </div>`;
  drawMatSel();
}
async function addMatItem(){
  const id=document.getElementById('mp_sel').value;
  const qtd=num('mp_qtd');
  if(qtd<=0){toast('Informe a quantidade');return;}
  const m=await dbGet('materials',id);if(!m)return;
  orc.materiais.push({matId:m.id,nome:m.nome,tipo:m.tipo,custoUnit:m.custoUnit,qtd,estoque:m.estoque||0,estoqueMin:m.estoqueMin||0});
  document.getElementById('mp_qtd').value='';
  drawMatSel();refreshSummary();
}
function drawMatSel(){
  const box=document.getElementById('matSelList');if(!box)return;
  if(orc.materiais.length===0){box.innerHTML='';return;}
  box.innerHTML=orc.materiais.map((m,i)=>{
    const t=MAT_TIPOS[m.tipo]||MAT_TIPOS.folha;
    const subtotal=m.custoUnit*m.qtd;
    const estoque=m.estoque||0;
    const sobra=estoque-m.qtd;
    let aviso='';
    if(m.qtd>estoque){
      aviso=`<div class="stock-warn">⚠ Estoque insuficiente: você tem ${estoque.toLocaleString('pt-BR')} ${t.usoLabel}${estoque!==1?'s':''}, vai faltar ${(m.qtd-estoque).toLocaleString('pt-BR')}</div>`;
    } else if(m.estoqueMin>0 && sobra<=m.estoqueMin){
      aviso=`<div class="stock-warn" style="color:#D97706">⚠ Após este trabalho o estoque fica baixo (${sobra.toLocaleString('pt-BR')} ${t.usoLabel}${sobra!==1?'s':''})</div>`;
    }
    return `<div class="sel-item">
      <div class="si-info">
        <div class="si-name">${esc(m.nome)}</div>
        <div class="si-detail">${m.qtd} ${t.usoLabel}${m.qtd!==1?'s':''} × ${fmt6(m.custoUnit)}</div>
        ${aviso}
      </div>
      <div class="si-val">${fmt(subtotal)}</div>
      <button class="si-del" onclick="orc.materiais.splice(${i},1);drawMatSel();refreshSummary()"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>`;
  }).join('');
}

/* ---------- Seletor de equipamentos (modo avançado) ---------- */
async function drawEqPicker(){
  const eqs=(await dbAll('equipment')).sort((a,b)=>(a.nome||'').localeCompare(b.nome||''));
  const box=document.getElementById('eqPicker');if(!box)return;
  if(eqs.length===0){box.innerHTML=`<p style="color:var(--text-3);font-size:13px">Nenhum equipamento cadastrado.</p>`;return;}
  const opts=eqs.map(e=>`<option value="${e.id}">${esc(e.nome)}</option>`).join('');
  box.innerHTML=`<div class="item-add-row">
    <div class="form-row"><label>Equipamento</label><select class="inp" id="ep_sel" onchange="updateEqMode()">${opts}</select></div>
    <div class="form-row" style="max-width:160px"><label>Cobrar por</label><select class="inp" id="ep_modo" onchange="updateEqUnit()"></select></div>
    <div class="form-row" style="max-width:120px"><label id="ep_unitLabel">Minutos</label><input class="inp" type="number" step="0.01" id="ep_qtd" placeholder="0"></div>
    <button class="btn-mini" onclick="addEqItem()">+ Adicionar</button>
  </div>`;
  await updateEqMode();
  drawEqSel();
}
async function updateEqMode(){
  const id=document.getElementById('ep_sel').value;
  const e=await dbGet('equipment',id);
  const modo=document.getElementById('ep_modo');
  let opts=`<option value="tempo">Tempo (depreciação)</option>`;
  if(e&&e.temTinta){opts+=`<option value="pb">Impressão P&B</option><option value="cor">Impressão colorida</option>`;}
  modo.innerHTML=opts;
  updateEqUnit();
}
function updateEqUnit(){
  const modo=document.getElementById('ep_modo').value;
  document.getElementById('ep_unitLabel').textContent = modo==='tempo'?'Minutos':'Páginas';
}
async function addEqItem(){
  const id=document.getElementById('ep_sel').value;
  const modo=document.getElementById('ep_modo').value;
  const qtd=num('ep_qtd');
  if(qtd<=0){toast('Informe a quantidade');return;}
  const e=await dbGet('equipment',id);if(!e)return;
  const item={eqId:e.id,nome:e.nome,tipo:modo,minutos:0,paginas:0,deprecHora:e.deprecHora,custoPB:e.custoPB,custoCor:e.custoCor};
  if(modo==='tempo')item.minutos=qtd; else item.paginas=qtd;
  orc.equipamentos.push(item);
  document.getElementById('ep_qtd').value='';
  drawEqSel();refreshSummary();
}
function drawEqSel(){
  const box=document.getElementById('eqSelList');if(!box)return;
  if(orc.equipamentos.length===0){box.innerHTML='';return;}
  box.innerHTML=orc.equipamentos.map((e,i)=>{
    let sub=0,detail='';
    if(e.tipo==='tempo'){sub=e.deprecHora*(e.minutos/60);detail=`${e.minutos} min × ${fmt6(e.deprecHora)}/h (depreciação)`;}
    else if(e.tipo==='pb'){sub=e.custoPB*e.paginas;detail=`${e.paginas} pág. P&B × ${fmt6(e.custoPB)}`;}
    else{sub=e.custoCor*e.paginas;detail=`${e.paginas} pág. cor × ${fmt6(e.custoCor)}`;}
    return `<div class="sel-item">
      <div class="si-info"><div class="si-name">${esc(e.nome)}</div><div class="si-detail">${detail}</div></div>
      <div class="si-val">${fmt(sub)}</div>
      <button class="si-del" onclick="orc.equipamentos.splice(${i},1);drawEqSel();refreshSummary()"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>`;
  }).join('');
}

/* ---------- Salvar orçamento ---------- */
/* ============================================================
   MÓDULO: PRODUTOS (receitas reutilizáveis)
   Um produto guarda a "receita" (materiais, equipamentos, mão de
   obra, etc). Ao usar, recalcula o preço com os CUSTOS ATUAIS.
   ============================================================ */
// Atualiza os custos unitários dos materiais de uma receita com os valores atuais do cadastro
async function atualizarCustosReceita(receita){
  const mats=await dbAll('materials');
  const r=JSON.parse(JSON.stringify(receita));
  if(r.materiais)r.materiais.forEach(m=>{
    const atual=mats.find(x=>x.id===m.matId);
    if(atual)m.custoUnit=atual.custoUnit||0; // pega o custo de hoje
  });
  return r;
}
async function renderProductsPage(main){
  main.innerHTML=`
    <div class="page-head-row">
      <div class="page-head" style="margin:0">
        <h2><svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="var(--brand)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${ICON.materials}</svg> Produtos</h2>
        <p class="desc">Produtos que você faz com frequência. Monte a receita uma vez, reutilize sempre — o preço recalcula com os custos atuais.</p>
      </div>
      <button class="btn-add" onclick="goTab('pricing')">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Criar produto (na precificação)
      </button>
    </div>
    <div id="productsList"></div>`;
  drawProducts();
}
async function drawProducts(){
  const prods=(await dbAll('products')).sort((a,b)=>(a.nome||'').localeCompare(b.nome||''));
  const box=document.getElementById('productsList');if(!box)return;
  if(prods.length===0){
    box.innerHTML=`<div class="tbl-wrap"><div class="empty-state">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">${ICON.materials}</svg>
      <h3>Nenhum produto salvo</h3>
      <p>Quando você precificar algo que faz sempre (ex: bloquinho A6), clique em "Salvar como produto" na tela de precificação. Ele fica guardado aqui para reusar.</p>
    </div></div>`;return;
  }
  // recalcula preço atual de cada produto
  const linhas=[];
  for(const p of prods){
    const receita=await atualizarCustosReceita(p.receita);
    const oldMode=priceMode; priceMode=p.receita.modo||null;
    const c=calcOrc(receita);
    priceMode=oldMode;
    linhas.push({p,preco:c.precoFinal,custo:c.custoTotal});
  }
  box.innerHTML=`<div class="tbl-wrap"><div class="tbl-scroll"><table>
    <thead><tr><th>Produto</th><th>Tipo</th><th class="t-right">Custo atual</th><th class="t-right">Preço atual</th><th class="t-right">Ações</th></tr></thead>
    <tbody>${linhas.map(({p,preco,custo})=>`
      <tr>
        <td><div class="t-main">${esc(p.nome)}</div>${p.obs?`<div class="t-sub">${esc(p.obs)}</div>`:''}</td>
        <td><span class="t-sub">${p.receita.modo==='terceirizado'?'Terceirizado':(p.receita.modo==='avancado'?'Avançado':'Rápido')}</span></td>
        <td class="t-right">${fmt(custo)}</td>
        <td class="t-right"><b style="color:var(--brand)">${fmt(preco)}</b></td>
        <td><div class="t-actions">
          <button class="btn-mini" onclick="usarProduto('${p.id}')">Usar no orçamento</button>

let cesta=[]; // {desc, qtd, precoUnit, modo, dados(snapshot da precificação)}

function addToCesta(){
  const c=calcOrc(orc);
  if(!orc.descricao||!orc.descricao.trim()){toast('Informe a descrição do produto');return;}
  const qtd=orc.cestaQtd&&orc.cestaQtd>0?orc.cestaQtd:1;
  // Snapshot da receita com materiais e tempos multiplicados pela quantidade
  // (assim o estoque baixa certo: 100 bloquinhos = 100× cada material)
  const snap=JSON.parse(JSON.stringify(orc));
  if(qtd>1){
    if(snap.materiais)snap.materiais.forEach(m=>{ m.qtd=(m.qtd||0)*qtd; });
    if(snap.equipamentos)snap.equipamentos.forEach(e=>{ if(e.paginas)e.paginas*=qtd; if(e.minutos)e.minutos*=qtd; });
    snap.maoObraMin=(snap.maoObraMin||0)*qtd;
  }
  cesta.push({
    desc:qtd>1?`${orc.descricao} (${qtd} un)`:orc.descricao,
    qtd:qtd,
    precoUnit:c.precoFinal,
    modo:priceMode,
    dados:snap
  });
  toast('Produto adicionado ao orçamento');
  // limpa para o próximo produto, mantendo o cliente
  const cliId=orc.clienteId;
  resetOrc();
  orc.clienteId=cliId;
  goTab('pricing');
  setTimeout(()=>renderCestaBar(),100);
}
function removeCesta(i){cesta.splice(i,1);renderCestaBar();}
function cestaTotal(){return cesta.reduce((s,p)=>s+p.precoUnit*p.qtd,0);}

function renderCestaBar(){

    document.body.appendChild(bar);

  bar.innerHTML=`

        <div style="font-size:11px;color:var(--text-3);font-weight:600;text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px">Orçamento atual — ${cesta.length} produto${cesta.length>1?'s':''}</div>

async function salvarCesta(){
  const total=cestaTotal();
  const id=uid();
  // Junta materiais de todos os produtos para baixa de estoque na aprovação
  const todosMat=[];
  cesta.forEach(p=>{ if(p.dados&&p.dados.materiais)p.dados.materiais.forEach(m=>todosMat.push(m)); });
  await dbPut('orders',{
    id, status:'orcamento', modo:'multi',
    clienteId:document.getElementById('cst_cli').value,
    descricao:val('cst_desc'),
    produtos:cesta.map(p=>({desc:p.desc,qtd:p.qtd,precoUnit:p.precoUnit,modo:p.modo})),
    materiais:todosMat,
    precoFinal:total, custoTotal:0, lucro:0,
    criadoEm:Date.now()
  });
  cesta=[];
  renderCestaBar();
  closeModal();
  toast('Orçamento salvo!');
  goTab('pricing');
}

async function drawCompraItens(){

  const opts=m=>`<option value="">— Material —</option>`+mats.map(x=>`<option value="${x.id}" ${m.matId===x.id?'selected':''}>${esc(x.nome)} (${(MAT_TIPOS[x.tipo]||MAT_TIPOS.folha).usoLabel})</option>`).join('');

      <div class="inp-prefix" style="width:120px"><span>R$</span><input class="inp" type="number" step="0.01" placeholder="Valor pago" value="${it.valorPago||''}" oninput="compraItens[${i}].valorPago=parseFloat(this.value)||0;drawCompraCalc()" title="Valor total pago neste item"></div>

    </div>`).join('');
  drawCompraCalc();

function addCompraItem(){compraItens.push({matId:'',qtd:0,valorPago:0});drawCompraItens();}

function calcCompra(){
  const frete=num('cmp_frete');
  const valorItens=compraItens.reduce((s,it)=>s+(it.valorPago||0),0);
  const mats=window._cmpMats||[];
  const linhas=compraItens.map(it=>{
    const mat=mats.find(m=>m.id===it.matId);
    const propFrete=valorItens>0?(it.valorPago/valorItens)*frete:0;
    const custoTotalItem=it.valorPago+propFrete;
    const custoUnitNovo=it.qtd>0?custoTotalItem/it.qtd:0;
    // custo médio ponderado com estoque existente
    let custoMedio=custoUnitNovo, estoqueNovo=it.qtd;
    if(mat){
      const estAnt=mat.estoque||0, custoAnt=mat.custoUnit||0;
      estoqueNovo=estAnt+it.qtd;
      custoMedio=estoqueNovo>0?((estAnt*custoAnt)+(custoTotalItem))/estoqueNovo:custoUnitNovo;
    }
    return {it,mat,propFrete,custoTotalItem,custoUnitNovo,custoMedio,estoqueNovo};
  });
  return {frete,valorItens,total:valorItens+frete,linhas};
}
function drawCompraCalc(){
  const box=document.getElementById('cmpCalc');if(!box)return;
  const c=calcCompra();
  if(c.valorItens===0){box.innerHTML='';return;}
  box.innerHTML=`<div class="calc-box" style="margin:0">
    <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:6px"><span class="sl-label">Valor dos itens</span><b>${fmt(c.valorItens)}</b></div>
    <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:6px"><span class="sl-label">Frete rateado</span><b>${fmt(c.frete)}</b></div>
    <div style="display:flex;justify-content:space-between;font-size:14px;border-top:1px solid var(--border);padding-top:8px"><span class="sl-label" style="font-weight:600">Total da compra</span><b style="color:var(--brand)">${fmt(c.total)}</b></div>
    <div style="margin-top:12px;font-size:11.5px;color:var(--text-3);font-weight:600;text-transform:uppercase;letter-spacing:.04em">Novo custo de cada material</div>
    ${c.linhas.filter(l=>l.mat).map(l=>{
      const t=MAT_TIPOS[l.mat.tipo]||MAT_TIPOS.folha;
      return `<div style="display:flex;justify-content:space-between;font-size:12.5px;margin-top:6px">
        <span>${esc(l.mat.nome)} <span style="color:var(--text-3)">(+${fmt(l.propFrete)} frete)</span></span>
        <span><b style="color:var(--brand)">${fmt6(l.custoMedio)}</b>/${t.usoLabel}</span>
      </div>`;}).join('')}
  </div>`;
}
async function salvarCompra(){
  const c=calcCompra();
  const validos=c.linhas.filter(l=>l.mat&&l.it.qtd>0);
  if(validos.length===0){toast('Adicione ao menos um material com quantidade');return;}
  // Atualiza cada material: custo médio + estoque
  for(const l of validos){
    const mat=await dbGet('materials',l.mat.id);
    mat.estoque=l.estoqueNovo;
    mat.custoUnit=l.custoMedio;
    await dbPut('materials',mat);
  }
  // Lança despesa no financeiro
  const forn=document.getElementById('cmp_forn').value;
  const data=val('cmp_data');
  await dbPut('transactions',{
    id:uid(),tipo:'despesa',descricao:'Compra de insumos'+(c.frete>0?' (c/ frete)':''),
    valor:c.total,categoria:'Compra de material',banco:'caixa',
    fornecedorId:forn,data,confirmada:true,auto:true,criadoEm:Date.now()
  });
  closeModal();
  toast('Compra registrada! Estoque e custos atualizados');
  drawMaterials();
}

function drawSaidaCalc(){

  const linhas=saidaItens.filter(it=>it.matId&&it.qtd>0).map(it=>{
    const mat=mats.find(m=>m.id===it.matId);

async function salvarSaidaInterna(){
  const mats=window._siMats||[];
  const validos=saidaItens.filter(it=>it.matId&&it.qtd>0);
  if(validos.length===0){toast('Adicione ao menos um material');return;}
  let custoTotal=0;
  for(const it of validos){
    const mat=await dbGet('materials',it.matId);
    mat.estoque=Math.max(0,(mat.estoque||0)-it.qtd);

  const motivo=val('si_motivo')||'Uso interno';

  toast('Saída registrada! Estoque baixado');

function isLate(o){
  if(!o.prazo||o.status==='entregue')return false;
  return new Date(o.prazo+'T23:59:59')<new Date();
}
function isToday(o){
  if(!o.prazo)return false;
  const hoje=new Date().toISOString().slice(0,10);
  return o.prazo===hoje;
}

async function confirmApprove(){
  const id=val('ap_id');
  const o=await dbGet('orders',id);
  o.precoFinal=num('ap_valor');
  o.entrada=num('ap_entrada');
  o.prazo=val('ap_prazo');
  o.pago=o.entrada>=o.precoFinal?'sim':(o.entrada>0?'parcial':'nao');
  const precisaDesign=document.getElementById('ap_design').checked;
  o.status=precisaDesign?'design':'producao';
  o.aprovadoEm=Date.now();
  // Baixa de estoque
  for(const m of (o.materiais||[])){
    if(!m.matId)continue;
    const mat=await dbGet('materials',m.matId);
    if(mat){mat.estoque=Math.max(0,(mat.estoque||0)-(m.qtd||0));await dbPut('materials',mat);}
  }
  await dbPut('orders',o);
  // Registra a entrada como receita automática
  if(o.entrada>0){
    await dbPut('transactions',{
      id:uid(),tipo:'receita',descricao:'Entrada — '+o.descricao,
      valor:o.entrada,categoria:'Venda de pedido',banco:'caixa',
      clienteId:o.clienteId,pedidoId:o.id,data:new Date().toISOString().slice(0,10),
      confirmada:true,auto:true,criadoEm:Date.now()
    });
  }
  closeModal();toast('Pedido aprovado!');
  if(currentTab==='orders')drawOrders(); else renderPage(currentTab);
}

/* ---------- Detalhe do pedido + ações ---------- */
async function orderDetail(id){
  const o=await dbGet('orders',id);if(!o)return;
  const clients=await dbAll('clients');const cli=clients.find(c=>c.id===o.clienteId);
  const t=MAT_TIPOS;
  const isOrc=o.status==='orcamento';
  const restante=(o.precoFinal||0)-(o.entrada||0);

  // Próxima ação de status
  let nextBtn='';
  const idx=STATUS_FLOW.indexOf(o.status);
  if(idx>=0&&idx<STATUS_FLOW.length-1){
    const next=STATUS_FLOW[idx+1];
    nextBtn=`<button class="btn-save" onclick="advanceStatus('${o.id}','${next}')">Marcar como ${STATUS_LABEL[next]}</button>`;
  }
  // Botão de voltar status (retroceder)
  let backBtn='';
  if(idx>0){
    const prev=STATUS_FLOW[idx-1];
    backBtn=`<button class="btn-ghost" onclick="advanceStatus('${o.id}','${prev}')">← ${STATUS_LABEL[prev]}</button>`;
  }

  let payBtn='';
  if(!isOrc&&o.pago!=='sim'){
    payBtn=`<button class="btn-mini" style="padding:11px 18px" onclick="payModal('${o.id}')">Dar baixa no pagamento</button>`;
  }

  // Composição (rápido/avançado vs terceirizado)
  let comp='';
  if(o.modo==='terceirizado'){
    const cArte = o.arteMod==='tempo' ? (calcOrc(o).custoArte) : (o.arteValor||0);
    comp=`<div class="sum-line"><span class="sl-label">Custo no site</span><span class="sl-val">${fmt(o.custoSite||0)}</span></div>
      ${cArte>0?`<div class="sum-line"><span class="sl-label">Arte</span><span class="sl-val">${fmt(cArte)}</span></div>`:''}`;
  }else{
    comp=`${(o.materiais||[]).map(m=>`<div class="sum-line"><span class="sl-label">${esc(m.nome)} (${m.qtd} ${(t[m.tipo]||t.folha).usoLabel}${m.qtd!==1?'s':''})</span><span class="sl-val">${fmt(m.custoUnit*m.qtd)}</span></div>`).join('')}
      ${(o.equipamentos||[]).map(e=>{let s=e.tipo==='tempo'?e.deprecHora*(e.minutos/60):(e.tipo==='pb'?e.custoPB*e.paginas:e.custoCor*e.paginas);return `<div class="sum-line"><span class="sl-label">${esc(e.nome)}</span><span class="sl-val">${fmt(s)}</span></div>`;}).join('')}
      ${o.maoObraMin>0?`<div class="sum-line"><span class="sl-label">Mão de obra (${o.maoObraMin} min)</span><span class="sl-val">${fmt(calcOrc(o).custoMO)}</span></div>`:''}
      ${o.temArte?`<div class="sum-line"><span class="sl-label">Criação de arte</span><span class="sl-val">${fmt(calcOrc(o).custoArteProp)}</span></div>`:''}
      ${(o.acabamentos||[]).map(a=>`<div class="sum-line"><span class="sl-label">${esc(a.nome)}</span><span class="sl-val">${fmt(a.valor)}</span></div>`).join('')}`;
  }

  openModal(`
    <div class="modal-head">
      <h3>${esc(o.descricao)}</h3>
      <button class="close" onclick="closeModal()"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <div class="modal-body">
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px">
        <span class="status-badge ${STATUS_CLASS[o.status]}">${STATUS_LABEL[o.status]}</span>
        ${!isOrc?(o.pago==='sim'?'<span class="pay-tag pay-sim" style="padding:4px 11px">Pago</span>':o.entrada>0?`<span class="pay-tag pay-parcial" style="padding:4px 11px">Entrada ${fmt(o.entrada)}</span>`:'<span class="pay-tag pay-nao" style="padding:4px 11px">A receber</span>'):''}
      </div>
      <div class="sum-line"><span class="sl-label">Cliente</span><span class="sl-val">${esc(cli?cli.nome:'—')}</span></div>
      ${o.prazo?`<div class="sum-line"><span class="sl-label">Prazo</span><span class="sl-val ${isLate(o)?'due-late':''}">${new Date(o.prazo+'T12:00:00').toLocaleDateString('pt-BR')}</span></div>`:''}
      <div class="sum-divider"></div>
      <div style="font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--text-3);margin-bottom:8px">Composição</div>
      ${comp}
      <div class="sum-divider"></div>
      <div class="sum-line"><span class="sl-label">Custo total</span><span class="sl-val">${fmt(o.custoTotal)}</span></div>
      <div class="sum-total"><span class="st-label">PREÇO FINAL</span><span class="st-val" style="font-size:23px">${fmt(o.precoFinal)}</span></div>
      ${!isOrc&&o.pago!=='sim'?`<div class="sum-margin" style="font-size:13px;margin-top:8px">Falta receber: <b style="color:#E5484D">${fmt(restante)}</b></div>`:''}
    </div>
    <div class="modal-foot" style="flex-wrap:wrap">
      <button class="btn-ghost" onclick="closeModal();pdfModal('${o.id}')"><svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px;margin-right:4px"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>PDF</button>
      ${isOrc?`<button class="btn-ghost" onclick="closeModal();editOrc('${o.id}')">Editar</button><button class="btn-save" onclick="closeModal();approveModal('${o.id}')">Aprovar orçamento</button>`:`${backBtn}${payBtn}${nextBtn}`}
    </div>`);
}

async function renderFinancePage(main){

      <div class="page-head" style="margin:0">

function goFinSub(s,keep){
  finSub=s;

  if(s==='transacoes')renderFinTransacoes();
  else if(s==='receber')renderContasReceber();
  else if(s==='pagar')renderContasPagar();
  else if(s==='recorrentes')renderRecorrentes();
}

async function renderFinTransacoes(){
  const txs=await dbAll('transactions');
  const doMes=txs.filter(t=>(t.data||'').slice(0,7)===finMonth);
  const receitas=doMes.filter(t=>t.tipo==='receita').reduce((s,t)=>s+(t.valor||0),0);
  const despesas=doMes.filter(t=>t.tipo==='despesa').reduce((s,t)=>s+(t.valor||0),0);
  const saldo=receitas-despesas;
  const saldoGeral=txs.filter(t=>t.confirmada!==false).reduce((s,t)=>s+(t.tipo==='receita'?(t.valor||0):-(t.valor||0)),0);
  const [ano,mes]=finMonth.split('-');
  const mesNome=new Date(ano,mes-1,1).toLocaleDateString('pt-BR',{month:'long',year:'numeric'});
  document.getElementById('finContent').innerHTML=`
    <div class="page-head-row" style="margin-bottom:14px">
      <div style="display:flex;align-items:center;gap:12px">
        <button class="act-btn" onclick="changeMonth(-1)"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg></button>
        <div style="font-weight:600;font-size:15px;text-transform:capitalize;min-width:150px;text-align:center">${mesNome}</div>
        <button class="act-btn" onclick="changeMonth(1)"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg></button>
      </div>
      <button class="btn-add" onclick="txModal()"><svg viewBox="0 0 24 24" fill="none" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg> Nova transação</button>
    </div>
    <div class="fin-cards">
      <div class="fin-card rec"><div class="fc-label">Receitas do mês</div><div class="fc-val">${fmt(receitas)}</div></div>
      <div class="fin-card desp"><div class="fc-label">Despesas do mês</div><div class="fc-val">${fmt(despesas)}</div></div>
      <div class="fin-card saldo"><div class="fc-label">Resultado do mês</div><div class="fc-val">${fmt(saldo)}</div></div>
      <div class="fin-card"><div class="fc-label">Saldo geral acumulado</div><div class="fc-val">${fmt(saldoGeral)}</div></div>
    </div>
    <div class="filter-pills" id="finPills">
      ${[['todos','Todas'],['receita','Receitas'],['despesa','Despesas']].map(([k,l])=>`<button class="pill ${finFilter===k?'active':''}" onclick="setFinFilter('${k}')">${l}</button>`).join('')}
    </div>
    <div id="txTable"></div>`;
  drawTx();
}

function changeMonth(d){
  const [a,m]=finMonth.split('-').map(Number);
  const dt=new Date(a,m-1+d,1);
  finMonth=dt.toISOString().slice(0,7);
  renderFinTransacoes();
}
function setFinFilter(f){finFilter=f;document.querySelectorAll('#finPills .pill').forEach(p=>p.classList.remove('active'));event.target.classList.add('active');drawTx();}

async function drawTx(){
  let txs=await dbAll('transactions');
  const clients=await dbAll('clients');const cMap={};clients.forEach(c=>cMap[c.id]=c.nome);
  txs=txs.filter(t=>(t.data||'').slice(0,7)===finMonth);
  if(finFilter!=='todos')txs=txs.filter(t=>t.tipo===finFilter);
  txs.sort((a,b)=>(b.data||'').localeCompare(a.data||'')||(b.criadoEm||0)-(a.criadoEm||0));
  const box=document.getElementById('txTable');if(!box)return;
  if(txs.length===0){
    box.innerHTML=`<div class="tbl-wrap"><div class="empty-state">

  box.innerHTML=`<div class="tbl-wrap"><div class="tbl-scroll"><table>
    <thead><tr><th></th><th>Descrição</th><th>Categoria</th><th>Data</th><th class="t-right">Valor</th><th class="t-right">Ações</th></tr></thead>

        <td>${t.data?new Date(t.data+'T12:00:00').toLocaleDateString('pt-BR'):'—'}</td>
        <td class="t-right ${rec?'val-rec':'val-desp'}">${rec?'+':'−'} ${fmt(t.valor)}</td>

        </div></td>
      </tr>`;}).join('')}</tbody></table></div></div>`;

  toast('Excluída');renderFinTransacoes();

        <div class="radio-opt" id="tx_desp" onclick="setTxType('despesa')"><div class="ro-title" style="color:#E5484D">↓ Despesa</div><div class="ro-desc">Saiu dinheiro</div></div>
      </div>

}
function setTxType(t){
  window._txType=t;
  document.getElementById('tx_rec').classList.toggle('sel',t==='receita');
  document.getElementById('tx_desp').classList.toggle('sel',t==='despesa');
  const sel=document.getElementById('tx_cat');
  const cats=t==='receita'?(CONFIG.catReceita||[]):(CONFIG.catDespesa||[]);
  sel.innerHTML=cats.map(c=>`<option>${esc(c)}</option>`).join('');
}
async function saveTx(){
  const desc=val('tx_desc'),valor=num('tx_valor');
  if(!desc){toast('Informe a descrição');return;}
  if(valor<=0){toast('Informe o valor');return;}
  await dbPut('transactions',{
    id:uid(),tipo:window._txType,descricao:desc,valor,
    categoria:val('tx_cat'),banco:'caixa',clienteId:val('tx_cli'),
    data:val('tx_data'),confirmada:true,criadoEm:Date.now()
  });
  closeModal();toast('Transação registrada');renderFinTransacoes();
}

/* ============================================================
   CONTAS A RECEBER (pedidos não pagos + lançamentos manuais)
   ============================================================ */
function billStatus(b){
  if(b.pago)return 'pago';
  if(b.venc && new Date(b.venc+'T23:59:59')<new Date())return 'atrasado';
  return 'pendente';
}
const BILL_BADGE={pago:'pay-sim',pendente:'pay-parcial',atrasado:'pay-nao'};
const BILL_LABEL={pago:'Pago',pendente:'Pendente',atrasado:'Atrasado'};

async function renderContasReceber(){
  const orders=await dbAll('orders');
  const clients=await dbAll('clients');const cMap={};clients.forEach(c=>cMap[c.id]=c.nome);
  const manual=(await dbAll('bills')).filter(b=>b.tipo==='receber');
  // Pedidos com saldo a receber
  const pedidosReceber=orders.filter(o=>o.status!=='orcamento'&&o.pago!=='sim').map(o=>({
    id:'ped_'+o.id, pedidoId:o.id, tipo:'receber', origem:'pedido',
    descricao:o.descricao, clienteId:o.clienteId,
    valor:(o.precoFinal||0)-(o.entrada||0), venc:o.prazo||'', pago:false
  }));
  const todos=[...pedidosReceber,...manual.map(b=>({...b,origem:'manual'}))];
  const pendente=todos.filter(b=>!b.pago).reduce((s,b)=>s+(b.valor||0),0);
  const atrasado=todos.filter(b=>billStatus(b)==='atrasado').reduce((s,b)=>s+(b.valor||0),0);

  document.getElementById('finContent').innerHTML=`
    <div class="page-head-row" style="margin-bottom:14px">
      <div></div>
      <button class="btn-add" onclick="billModal('receber')"><svg viewBox="0 0 24 24" fill="none" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg> Lançar a receber</button>
    </div>
    <div class="fin-cards">
      <div class="fin-card rec"><div class="fc-label">Total a receber</div><div class="fc-val">${fmt(pendente)}</div></div>
      <div class="fin-card desp"><div class="fc-label">Em atraso</div><div class="fc-val">${fmt(atrasado)}</div></div>
    </div>
    ${todos.length===0?`<div class="tbl-wrap"><div class="empty-state"><svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">${ICON.finance}</svg><h3>Nada a receber</h3><p>Pedidos não pagos e lançamentos manuais aparecem aqui.</p></div></div>`:`
    <div class="tbl-wrap"><div class="tbl-scroll"><table>
      <thead><tr><th>Descrição</th><th>Cliente</th><th>Vencimento</th><th>Status</th><th class="t-right">Valor</th><th class="t-right">Ações</th></tr></thead>
      <tbody>${todos.sort((a,b)=>(a.venc||'z').localeCompare(b.venc||'z')).map(b=>{
        const st=billStatus(b);
        return `<tr>
          <td><div class="t-main">${esc(b.descricao)}</div>${b.origem==='pedido'?'<div class="t-sub">do pedido</div>':''}</td>
          <td>${esc(cMap[b.clienteId]||'—')}</td>
          <td class="${st==='atrasado'?'due-late':''}">${b.venc?new Date(b.venc+'T12:00:00').toLocaleDateString('pt-BR'):'—'}</td>
          <td><span class="pay-tag ${BILL_BADGE[st]}" style="padding:4px 11px">${BILL_LABEL[st]}</span></td>
          <td class="t-right"><b style="color:#1A8A4E">${fmt(b.valor)}</b></td>
          <td><div class="t-actions">
            ${b.origem==='pedido'?`<button class="btn-mini" onclick="payModal('${b.pedidoId}')">Receber</button>`:`<button class="btn-mini" onclick="receberBill('${b.id}')">Receber</button><button class="act-btn danger" onclick="delBill('${b.id}','receber')" title="Excluir"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/></svg></button>`}
          </div></td>
        </tr>`;}).join('')}</tbody></table></div></div>`}`;
}
async function receberBill(id){
  const b=await dbGet('bills',id);
  b.pago=true;b.pagoEm=Date.now();
  await dbPut('bills',b);
  // vira receita no caixa
  await dbPut('transactions',{id:uid(),tipo:'receita',descricao:'Recebimento — '+b.descricao,valor:b.valor,categoria:'Outras receitas',banco:'caixa',clienteId:b.clienteId||'',data:new Date().toISOString().slice(0,10),confirmada:true,auto:true,criadoEm:Date.now()});
  toast('Recebido!');renderContasReceber();
}

async function saveBill(tipo){
  const desc=val('b_desc'),valor=num('b_valor');
  if(!desc){toast('Informe a descrição');return;}
  if(valor<=0){toast('Informe o valor');return;}
  const id=val('b_id')||uid();
  const ex=val('b_id')?await dbGet('bills',id):null;
  const rec={...(ex||{}),id,tipo,descricao:desc,valor,venc:val('b_venc'),pago:ex?ex.pago:false,criadoEm:ex?ex.criadoEm:Date.now()};
  if(tipo==='pagar'){rec.fornecedorId=document.getElementById('b_forn').value;rec.categoria=document.getElementById('b_cat').value;}
  else{rec.clienteId=document.getElementById('b_cli').value;}
  await dbPut('bills',rec);
  closeModal();toast('Conta salva');
  tipo==='pagar'?renderContasPagar():renderContasReceber();
}
async function delBill(id,tipo){
  if(!confirm('Excluir esta conta?'))return;
  await dbDel('bills',id);
  toast('Excluída');tipo==='pagar'?renderContasPagar():renderContasReceber();
}

/* ============================================================
   DESPESAS FIXAS / RECORRENTES (lançam sozinhas todo mês)
   ============================================================ */
async function gerarRecorrentes(){
  const recs=await dbAll('recurring');
  const mesAtual=new Date().toISOString().slice(0,7);
  for(const r of recs){
    if(!r.ativo)continue;
    if(r.ultimoMes===mesAtual)continue;
    // lança a despesa do mês atual
    const dia=String(r.dia||1).padStart(2,'0');
    const data=mesAtual+'-'+dia;
    await dbPut('transactions',{id:uid(),tipo:'despesa',descricao:r.nome+' (fixa)',valor:r.valor,categoria:'Despesa fixa',banco:'caixa',data,confirmada:true,auto:true,recorrenteId:r.id,criadoEm:Date.now()});
    r.ultimoMes=mesAtual;
    await dbPut('recurring',r);
  }
}

  const total=recs.filter(r=>r.ativo).reduce((s,r)=>s+(r.valor||0),0);
